{% extends "base.html" %}
{% block titulo %}Novo produto{% endblock %}
{% block conteudo %}

<header class="page-header">
  <h1>Novo produto</h1>
  <p class="muted"><a href="/produtos">← voltar</a></p>
</header>

{% if erro %}
<div class="alerta alerta-erro">{{ erro }}</div>
{% endif %}

<form method="post" action="/produtos/novo" class="form-vertical">
  <div class="form-row">
    <label>
      Plataforma
      <select name="plataforma" required>
        <option value="ml">Mercado Livre</option>
        <option value="shopee">Shopee</option>
        <option value="amazon">Amazon</option>
        <option value="magalu">Magalu</option>
        <option value="aliexpress">AliExpress</option>
      </select>
    </label>
    <label>
      Item ID
      <input type="text" name="item_id" required maxlength="100" placeholder="MLB123456789">
    </label>
  </div>

  <label>
    Nome do produto
    <input type="text" name="nome" required maxlength="500">
  </label>

  <div class="form-row">
    <label>
      Preço atual (R$)
      <input type="text" name="preco" required placeholder="89.90">
    </label>
    <label>
      Preço original (opcional)
      <input type="text" name="preco_orig" placeholder="159.00">
    </label>
    <label>
      Desconto % (opcional)
      <input type="text" name="desconto" placeholder="44">
    </label>
    <label>
      Comissão % (opcional)
      <input type="text" name="comissao" placeholder="8">
    </label>
  </div>

  <label>
    Categoria (opcional)
    <input type="text" name="categoria" maxlength="200">
  </label>

  <label>
    URL canônica (sem tag)
    <input type="text" name="url_canonica" maxlength="2000">
  </label>

  <label>
    URL com tag de afiliado
    <input type="text" name="url_afiliado" maxlength="2000">
    <span class="muted small">É a URL que vai pro grupo. Se vazia, usa a canônica.</span>
  </label>

  <label>
    URL da foto
    <input type="text" name="foto_url" maxlength="2000">
  </label>

  <label>
    Nichos (segura Ctrl pra selecionar vários)
    <select name="nichos_ids" multiple size="8" style="height: auto;">
      {% for n in nichos %}
        <option value="{{ n.id }}">{{ n.icone or '' }} {{ n.label }}</option>
      {% endfor %}
    </select>
  </label>

  <button type="submit" class="btn btn-primario">Criar produto</button>
</form>

{% endblock %}
