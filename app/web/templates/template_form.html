{% extends "base.html" %}
{% block titulo %}Novo template{% endblock %}
{% block conteudo %}

<header class="page-header">
  <h1>Novo template</h1>
  <p class="muted"><a href="/templates">← voltar</a></p>
</header>

{% if erro %}
<div class="alerta alerta-erro">{{ erro }}</div>
{% endif %}

<form method="post" action="/templates/novo" class="form-vertical">
  <label>
    Nome do template
    <input type="text" name="nome" required maxlength="150" placeholder="Ex: Padrão Tecnologia">
  </label>

  <label>
    Nicho (deixe em branco = template padrão pra todos os nichos)
    <select name="nicho_id">
      <option value="">— padrão (fallback geral) —</option>
      {% for n in nichos %}
        <option value="{{ n.id }}" {% if nicho_id_pre == n.id %}selected{% endif %}>
          {{ n.icone or '' }} {{ n.label }}
        </option>
      {% endfor %}
    </select>
  </label>

  <label>
    Ordem (números menores aparecem primeiro)
    <input type="number" name="ordem" value="0" min="0" max="999">
  </label>

  <label>
    Texto do template
    <textarea id="texto-template" name="texto" required rows="12" maxlength="4096" placeholder="🔥 {chamada}

{nome}

{bloco_preco}

🛒 {url}"></textarea>

    <div class="picker" style="margin-top: 6px; display: flex; flex-direction: column; gap: 6px;">

      <div>
        <span class="muted small">Placeholders (clica pra inserir):</span><br>
        <button type="button" class="chip-insert" data-insert="{nome}">{nome}</button>
        <button type="button" class="chip-insert" data-insert="{preco}">{preco}</button>
        <button type="button" class="chip-insert" data-insert="{preco_orig}">{preco_orig}</button>
        <button type="button" class="chip-insert" data-insert="{desconto}">{desconto}</button>
        <button type="button" class="chip-insert" data-insert="{bloco_preco}">{bloco_preco}</button>
        <button type="button" class="chip-insert" data-insert="{plataforma}">{plataforma}</button>
        <button type="button" class="chip-insert" data-insert="{url}">{url}</button>
        <button type="button" class="chip-insert" data-insert="{chamada}">{chamada}</button>
        <button type="button" class="chip-insert" data-insert="{chamada_emoji}">{chamada_emoji}</button>
      </div>

      <div>
        <span class="muted small">Emojis (clica pra inserir):</span><br>
        <button type="button" class="emoji-insert" data-insert="🔥" title="fogo">🔥</button>
        <button type="button" class="emoji-insert" data-insert="⚡" title="raio">⚡</button>
        <button type="button" class="emoji-insert" data-insert="💥" title="bum">💥</button>
        <button type="button" class="emoji-insert" data-insert="🎯" title="alvo">🎯</button>
        <button type="button" class="emoji-insert" data-insert="✨" title="brilho">✨</button>
        <button type="button" class="emoji-insert" data-insert="💎" title="diamante">💎</button>
        <button type="button" class="emoji-insert" data-insert="🚀" title="foguete">🚀</button>
        <button type="button" class="emoji-insert" data-insert="👀" title="olhos">👀</button>
        <button type="button" class="emoji-insert" data-insert="📦" title="caixa">📦</button>
        <button type="button" class="emoji-insert" data-insert="💰" title="dinheiro">💰</button>
        <button type="button" class="emoji-insert" data-insert="⭐" title="estrela">⭐</button>
        <button type="button" class="emoji-insert" data-insert="🛒" title="carrinho">🛒</button>
        <button type="button" class="emoji-insert" data-insert="📱" title="celular">📱</button>
        <button type="button" class="emoji-insert" data-insert="💻" title="notebook">💻</button>
        <button type="button" class="emoji-insert" data-insert="🎁" title="presente">🎁</button>
        <button type="button" class="emoji-insert" data-insert="✅" title="check">✅</button>
        <button type="button" class="emoji-insert" data-insert="⏰" title="urgência">⏰</button>
        <button type="button" class="emoji-insert" data-insert="🎉" title="festa">🎉</button>
        <button type="button" class="emoji-insert" data-insert="❤️" title="coração">❤️</button>
        <button type="button" class="emoji-insert" data-insert="👇" title="aponta">👇</button>
        <button type="button" class="emoji-insert" data-insert="🏷️" title="etiqueta">🏷️</button>
        <button type="button" class="emoji-insert" data-insert="📢" title="alto-falante">📢</button>
        <button type="button" class="emoji-insert" data-insert="💸" title="grana voando">💸</button>
        <button type="button" class="emoji-insert" data-insert="🤩" title="encantado">🤩</button>
      </div>
    </div>
  </label>

  <button type="submit" class="btn btn-primario">Criar template</button>
</form>

<style>
  .chip-insert, .emoji-insert {
    display: inline-block;
    background: #f3f4f6;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 4px 10px;
    margin: 2px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s, border-color 0.1s;
  }
  .chip-insert {
    font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
    color: #2563eb;
  }
  .emoji-insert {
    font-size: 18px;
    padding: 2px 8px;
  }
  .chip-insert:hover, .emoji-insert:hover {
    background: #e5e7eb;
    border-color: #9ca3af;
  }
  .chip-insert:active, .emoji-insert:active {
    background: #dbeafe;
  }
</style>

<script>
  (function() {
    const txt = document.getElementById('texto-template');
    if (!txt) return;

    function inserir(valor) {
      // Insere no ponto do cursor, mantendo o que já estava digitado
      const ini = txt.selectionStart;
      const fim = txt.selectionEnd;
      const antes = txt.value.substring(0, ini);
      const depois = txt.value.substring(fim);
      txt.value = antes + valor + depois;
      // Posiciona o cursor logo após o inserido
      const novaPos = ini + valor.length;
      txt.focus();
      txt.setSelectionRange(novaPos, novaPos);
      // Dispara `input` pra qualquer validação reagir
      txt.dispatchEvent(new Event('input', { bubbles: true }));
    }

    document.querySelectorAll('.chip-insert, .emoji-insert').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        inserir(btn.dataset.insert);
      });
    });
  })();
</script>

{% endblock %}
