# ============================================================
# Configuração Alembic
# A URL do banco vem do .env via env.py — não edite aqui.
# ============================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Nome dos arquivos de migração: 2024_05_01_1234-titulo_da_migracao.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

# Truncar slug pra 40 chars
truncate_slug_length = 40

# Não use timezone — datetime é gerado pelo Postgres
timezone =

[post_write_hooks]
# Roda ruff format nos arquivos de migração gerados
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
